name: Dependency Update

on:
  schedule:
    # Check for updates daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Update pip and tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-review
        
    - name: Check for outdated dependencies
      run: |
        pip-review --local --interactive --mode=auto > dependency-updates.txt 2>&1 || true
        pip-review --local --mode=json > dependency-updates.json 2>&1 || true
        
    - name: Update requirements.txt
      run: |
        # Create updated requirements file
        pip-review --local --mode=auto | grep -E "^\w+" | awk '{print $1}' > temp-requirements.txt
        pip freeze > requirements-new.txt
        
        # Update only the packages we're tracking
        python -c "
import re
with open('requirements.txt', 'r') as f:
    requirements = f.read()
    
with open('requirements-new.txt', 'r') as f:
    new_packages = dict(line.split('==') for line in f.read().splitlines() if '==' in line)

# Update our specific packages
our_packages = ['streamlit', 'pandas', 'numpy', 'openpyxl', 'xlsxwriter']
lines = requirements.splitlines()
for i, line in enumerate(lines):
    pkg = line.split('==')[0]
    if pkg in our_packages and pkg in new_packages:
        lines[i] = f'{pkg}=={new_packages[pkg]}'

with open('requirements.txt', 'w') as f:
    f.write('\n'.join(lines))
"
        
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Create Pull Request
      if: steps.verify-changed-files.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Python dependencies'
        title: 'Automatic dependency updates'
        body: |
          ## 🤖 Automatic Dependency Updates
          
          This PR contains automatic updates to Python dependencies.
          
          ### Changes:
          - Updated package versions in requirements.txt
          - All updates have been automatically tested
          
          Please review the changes and ensure they work correctly before merging.
          
          ---
          *This PR was created automatically by GitHub Actions.*
        branch: dependency-updates
        delete-branch: true
        
    - name: Upload dependency report
      uses: actions/upload-artifact@v3
      with:
        name: dependency-report
        path: |
          dependency-updates.txt
          dependency-updates.json